<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* ANA BLOOD EFECT */
.blood {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  pointer-events: none;

  background-image: url('blood.png');
  background-repeat: no-repeat;

  /* SADECE YANLARA KOYUYORUZ */
  background-position: left top, right top;
  background-size: 300px auto, 300px auto;

  opacity: 0.9;

  animation: drip 3s infinite ease-in-out alternate;
}

/* hafif hareket hissi */
@keyframes drip {
  0% {
    transform: translateY(-5px);
    opacity: 0.85;
  }
  100% {
    transform: translateY(5px);
    opacity: 1;
  }
}
</style>

</head>

<body>

<div class="blood"></div>

<h1>Kiss N Destroy</h1>
<p>Isla Isabela hikayesi...</p>

</body>
